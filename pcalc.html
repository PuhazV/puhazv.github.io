<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 30-Year Retirement Projection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 1350px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        
        /* Inputs Section */
        .inputs-section { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; height: 850px; overflow-y: auto;}
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; color: #475569; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        h3 { margin-top: 0; color: #1e293b; font-size: 16px; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; margin-top: 20px; }

        /* Outputs Section */
        .outputs-section { display: flex; flex-direction: column; gap: 30px; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; height: 400px; }
        
        .table-container { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-family: monospace; }
        th { background-color: #2c3e50; color: white; position: sticky; top: 0; z-index: 10; text-align: right;}
        th:first-child, td:first-child { text-align: center; }
        tr:hover { background-color: #f1f5f9; }
        
        .event-row { background-color: #fef08a !important; } /* Highlight rows with one-time events */
        
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .inputs-section { height: auto; max-height: 500px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Advanced 30-Year Retirement Projection</h1>
    
    <div class="dashboard-grid">
        <div class="inputs-section">
            <h3>Initial Assets & Timeline</h3>
            <div class="input-group">
                <label>Retirement Year</label>
                <input type="number" id="retireYear" value="2028" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Stock Investments ($)</label>
                <input type="text" id="startLiquid" value="10,000,000" oninput="formatCurrencyInput(this)">
            </div>
            <div class="input-group">
                <label>House Investment ($)</label>
                <input type="text" id="startHouse" value="3,000,000" oninput="formatCurrencyInput(this)">
            </div>

            <h3>Growth & Stress Tests</h3>
            <div class="input-group">
                <label>Avg Stock Growth Rate (%)</label>
                <input type="number" id="stockGrowth" value="7" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Year 1 Market Drop (%) [Risk Test]</label>
                <input type="number" id="bearMarket" value="0" step="1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Real Estate Appreciation (%)</label>
                <input type="number" id="reApprec" value="4" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Inflation Rate (%)</label>
                <input type="number" id="inflation" value="4" step="0.1" oninput="calculate()">
            </div>

            <h3>Base Monthly Withdrawals</h3>
            <div class="input-group">
                <label>Years 1-10 ($ / month)</label>
                <input type="text" id="withdraw1" value="25,000" oninput="formatCurrencyInput(this)">
            </div>
            <div class="input-group">
                <label>Years 11-20 ($ / month)</label>
                <input type="text" id="withdraw2" value="25,000" oninput="formatCurrencyInput(this)">
            </div>
            <div class="input-group">
                <label>Years 21-30 ($ / month)</label>
                <input type="text" id="withdraw3" value="25,000" oninput="formatCurrencyInput(this)">
            </div>

            <h3>Social Security / Pension</h3>
            <div class="input-group">
                <label>Fixed Monthly Income ($ / month)</label>
                <input type="text" id="fixedIncome" value="0" oninput="formatCurrencyInput(this)">
            </div>
            <div class="input-group">
                <label>Start Year of Fixed Income</label>
                <input type="number" id="fixedIncomeYear" value="2035" oninput="calculate()">
            </div>

            <h3>One-Time Lifetime Events</h3>
            <div class="input-group">
                <label>Event 1: Year</label>
                <input type="number" id="event1Year" value="2032" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Event 1: Amount ($)</label>
                <input type="text" id="event1Amt" value="150,000" oninput="formatCurrencyInput(this)">
            </div>
            <div class="input-group">
                <label>Event 2: Year</label>
                <input type="number" id="event2Year" value="2040" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Event 2: Amount ($)</label>
                <input type="text" id="event2Amt" value="0" oninput="formatCurrencyInput(this)">
            </div>
        </div>

        <div class="outputs-section">
            <div class="chart-container" id="chartWrapper">
                <canvas id="projectionChart"></canvas>
            </div>
            
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Year</th>
                            <th>Start Liquid</th>
                            <th>Net Withdrawal</th>
                            <th>End Liquid</th>
                            <th>House Value</th>
                            <th>Nominal Net Worth</th>
                            <th style="background-color: #0f766e;">Purchasing Power (Today's $)</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let projectionChartInstance = null; 
    const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);

    // Auto-format currency inputs with commas
    function formatCurrencyInput(inputElem) {
        // Remove non-numeric characters (except period if you want decimals, keeping it simple here)
        let rawValue = inputElem.value.replace(/,/g, '').replace(/[^\d.]/g, '');
        if (rawValue !== '') {
            // Re-format with commas
            let parts = rawValue.split('.');
            parts[0] = Number(parts[0]).toLocaleString('en-US');
            inputElem.value = parts.join('.');
        } else {
            inputElem.value = '';
        }
        calculate();
    }

    // Helper to get raw number from formatted input
    const getNum = (id) => Number(document.getElementById(id).value.replace(/,/g, ''));

    function calculate() {
        try {
            const retireYear = getNum('retireYear');
            const startLiquid = getNum('startLiquid');
            const startHouse = getNum('startHouse');
            
            const stockGrowth = getNum('stockGrowth') / 100;
            const bearMarket = getNum('bearMarket') / 100; 
            const reApprec = getNum('reApprec') / 100;
            const inflation = getNum('inflation') / 100;

            const baseWithdraw1 = getNum('withdraw1') * 12; 
            const baseWithdraw2 = getNum('withdraw2') * 12; 
            const baseWithdraw3 = getNum('withdraw3') * 12; 

            const fixedIncome = getNum('fixedIncome') * 12; 
            const fixedIncomeYear = getNum('fixedIncomeYear');

            const event1Year = getNum('event1Year');
            const event1Amt = getNum('event1Amt');
            const event2Year = getNum('event2Year');
            const event2Amt = getNum('event2Amt');

            const labels = [];
            const liquidData = [];
            const reData = [];
            
            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = '';

            let currentLiquid = startLiquid;
            let isDepleted = false;

            for (let i = 0; i < 30; i++) {
                const currentYear = retireYear + i;
                
                // 1. Determine base lifestyle cost for the decade
                let annualBaseWithdrawal = 0;
                if (i < 10) annualBaseWithdrawal = baseWithdraw1;
                else if (i < 20) annualBaseWithdrawal = baseWithdraw2;
                else annualBaseWithdrawal = baseWithdraw3;

                // 2. Inflate the lifestyle cost
                let actualLifestyleCost = annualBaseWithdrawal * Math.pow(1 + inflation, i);

                // 3. Add one-time events (treated as nominal future dollars needed in that specific year)
                let eventTotal = 0;
                if (currentYear === event1Year) eventTotal += event1Amt;
                if (currentYear === event2Year) eventTotal += event2Amt;
                
                let totalExpenses = actualLifestyleCost + eventTotal;

                // 4. Apply Social Security / Pension offset
                let activeFixedIncome = 0;
                if (currentYear >= fixedIncomeYear) {
                    const yrsSinceFixedIncome = currentYear - retireYear; 
                    activeFixedIncome = fixedIncome * Math.pow(1 + inflation, yrsSinceFixedIncome);
                }

                // 5. Calculate NET Withdrawal from portfolio
                let requiredFromPortfolio = totalExpenses - activeFixedIncome;
                if (requiredFromPortfolio < 0) requiredFromPortfolio = 0; 

                // 6. Check if portfolio survives the withdrawal
                let safeWithdrawal = Math.min(requiredFromPortfolio, currentLiquid);
                if (currentLiquid <= 0) {
                    safeWithdrawal = 0;
                    isDepleted = true;
                }
                
                // 7. Apply Growth (Account for Sequence of Returns Risk in Year 1)
                let currentYearGrowth = (i === 0 && bearMarket > 0) ? -bearMarket : stockGrowth;
                let endLiquid = (currentLiquid - safeWithdrawal) * (1 + currentYearGrowth);
                if (endLiquid < 0) endLiquid = 0; 

                // 8. Calculate Real Estate and Net Worth
                const endHouse = startHouse * Math.pow(1 + reApprec, i + 1);
                const totalNominalNetWorth = endLiquid + endHouse;

                // 9. Calculate Purchasing Power
                const realNetWorth = totalNominalNetWorth / Math.pow(1 + inflation, i + 1);

                labels.push(currentYear);
                liquidData.push(endLiquid);
                reData.push(endHouse);

                // Build table row
                let tr = document.createElement('tr');
                if (eventTotal > 0) tr.classList.add('event-row'); // Highlight row if event happened
                
                let liqColor = isDepleted ? 'color:#dc2626; font-weight:bold;' : 'color:#2563eb;';
                tr.innerHTML = `
                    <td style="text-align:center;">${currentYear} ${eventTotal > 0 ? '★' : ''}</td>
                    <td>${formatCurrency(currentLiquid)}</td>
                    <td style="color:#dc2626;">-${formatCurrency(safeWithdrawal)}</td>
                    <td style="${liqColor}">${isDepleted ? '$0' : formatCurrency(endLiquid)}</td>
                    <td style="color:#16a34a;">${formatCurrency(endHouse)}</td>
                    <td style="font-weight:bold;">${formatCurrency(totalNominalNetWorth)}</td>
                    <td style="color:#0f766e; font-weight:bold;">${formatCurrency(realNetWorth)}</td>
                `;
                tbody.appendChild(tr);

                // Set up next year's start liquid
                currentLiquid = endLiquid;
            }

            updateChart(labels, liquidData, reData);

        } catch (error) {
            console.error("Calculation failed:", error);
        }
    }

    function updateChart(labels, liquid, realEstate) {
        if (typeof Chart === 'undefined') {
            document.getElementById('chartWrapper').innerHTML = '<p style="color:red; text-align:center; padding-top:150px;"><b>Chart failed to load.</b></p>';
            return;
        }

        const ctx = document.getElementById('projectionChart').getContext('2d');
        if (projectionChartInstance) { projectionChartInstance.destroy(); }

        projectionChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Stock / Liquid Assets ($)', data: liquid, backgroundColor: '#3b82f6', stack: 'Stack 0' },
                    { label: 'Real Estate Value ($)', data: realEstate, backgroundColor: '#10b981', stack: 'Stack 0' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    title: { display: true, text: '30-Year Asset Projection (Nominal)', font: { size: 16 } },
                    tooltip: { callbacks: { label: function(context) { return context.dataset.label + ': ' + new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(context.parsed.y); } } }
                },
                scales: { 
                    x: { stacked: true }, 
                    y: { stacked: true, ticks: { callback: function(value) { return '$' + (value / 1000000).toFixed(1) + 'M'; } } } 
                }
            }
        });
    }

    window.onload = calculate;
</script>
</body>
</html>
